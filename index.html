<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="screen-orientation" content="landscape">
    <title>AI Posture Corrector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>

    <div id="controls-overlay">
        <button id="plankBtn" class="btn-exercise active">Plank</button>
        <button id="pushupBtn" class="btn-exercise">Pushups</button>
        <button id="lungeBtn" class="btn-exercise">Lunges</button>
        <div class="rep-counter">REPS: <span id="rep-count">0</span></div>
    </div>

    <div id="feedback"><p>Loading...</p></div>

    <div id="portrait-warning">
        <p>Please rotate your device to landscape mode</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5/pose.js" crossorigin="anonymous"></script>
    <script src="utils.js"></script>
    <script src="poses.js"></script>
    <script src="script.js"></script>
</body>
</html>
