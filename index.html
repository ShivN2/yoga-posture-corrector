<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Posture Corrector</title>
    <link rel="stylesheet" href="style.css">
    <!-- MediaPipe Script Loading -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675469404/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675469404/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
</head>
<body>
    <h1>AI Posture Corrector</h1>
    <div class="main-container">
        <div class="controls-container">
            <h2>Select Exercise</h2>
            <button id="plankBtn" class="btn-exercise active">Plank</button>
            <button id="pushupBtn" class="btn-exercise">Pushups</button>
            <button id="lungeBtn" class="btn-exercise">Lunges</button>
            <div class="rep-counter">
                <h3>REPS: <span id="rep-count">0</span></h3>
            </div>
        </div>
        <div class="container">
            <!-- The video element is now hidden, we only show the canvas -->
            <video id="webcam" autoplay playsinline style="display: none;"></video>
            <canvas id="output_canvas" width="1280" height="720"></canvas>
        </div>
        <div id="feedback">
            <p>Loading...</p>
        </div>
    </div>
    <script src="script.js" type="module"></script>
</body>
</html>
